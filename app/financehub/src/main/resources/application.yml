server:
  port: 8080

spring:
  application:
    name: financehub
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/financehub}
    username: ${SPRING_DATASOURCE_USERNAME:financehub}
    password: ${SPRING_DATASOURCE_PASSWORD:financehub}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
      hibernate.format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI:http://localhost:8081/realms/financehub}

management:
  endpoints:
    web:
      exposure:
        include: "*"  
      base-path: /actuator
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always 
    env:
      show-values: always  
    configprops:
      show-values: always 
  metrics:
    tags:
      application: ${spring.application.name}


logging:
  level:
    root: DEBUG  
    org.springframework.security: DEBUG 
    org.hibernate.SQL: DEBUG  
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE  
    org.springframework.web: DEBUG 
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n" =

app:
  encryption:
    secret: "MyHardcodedSecret123!@#"


